name: External Validation (Hugging Face candidate)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  external-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Run external validation candidate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PYTHONPATH=. python3 external_validation/hf_space_contract.py
