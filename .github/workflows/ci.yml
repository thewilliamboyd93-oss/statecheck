name: Invariant Gate CI

# Runs the pytest suite for the current primitive system: verifier_search.py
# (the correctness gate) and tool_executor.py (the Invariant Gate). Scope
# was narrowed deliberately — see PROTOCOL.md changelog.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies (pinned, CPU-only torch)
        run: |
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          python -m pytest tests/ -v --tb=short
